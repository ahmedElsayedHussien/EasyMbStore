<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طباعة بطاقة هدية - {{ card.code }}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .gift-card-container {
            width: 500px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            color: #fff;
            padding: 30px;
            position: relative;
            overflow: hidden;
            border: 2px solid #ffca28;
        }
        .gift-card-container::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
        .card-header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 15px;
        }
        .store-brand {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title-text {
            font-size: 1.2rem;
            color: #ffca28;
            font-weight: 600;
        }
        .card-body-inner {
            text-align: center;
        }
        .amount-display {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            color: #fff;
        }
        .currency {
            font-size: 1.5rem;
            font-weight: 400;
            opacity: 0.8;
        }
        .card-code {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.5rem;
            letter-spacing: 3px;
            font-family: monospace;
            margin: 10px 0;
            display: inline-block;
            border: 1px dashed rgba(255, 255, 255, 0.3);
        }
        .barcode-container {
            margin: 15px 0;
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
        }
        .card-footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 20px;
            font-size: 0.85rem;
            opacity: 0.8;
        }
        .terms {
            text-align: right;
            line-height: 1.4;
        }
        
        .print-btn-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        @media print {
            body {
                background: none;
                height: auto;
                display: block;
            }
            .gift-card-container {
                box-shadow: none;
                -webkit-print-color-adjust: exact;
                color-adjust: exact;
                margin: 0 auto;
                margin-top: 50px;
            }
            .print-btn-container {
                display: none;
            }
        }
    </style>
    <!-- JsBarcode Library -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>

    <div class="gift-card-container">
        <div class="card-header-inner">
            <div class="store-brand">
                <i class="bi bi-shop"></i> 
                <span>EasyMB Store</span>
            </div>
            <div class="card-title-text">
                <i class="bi bi-gift-fill me-1"></i> بطاقة هدية
            </div>
        </div>
        
        <div class="card-body-inner">
            <div class="amount-display">
                {{ card.initial_balance|floatformat:0 }} <span class="currency">ج.م</span>
            </div>
            <div class="card-code">
                {{ card.code }}
            </div>
            <div class="barcode-container">
                <svg id="barcode"></svg>
            </div>
        </div>
        
        <div class="card-footer-inner">
            <div class="terms">
                * صالحة للاستخدام مرة واحدة فقط.<br>
                * غير قابلة للاستبدال نقداً.<br>
                {% if card.expires_at %}
                * صالحة حتى: {{ card.expires_at|date:"Y-m-d" }}
                {% endif %}
            </div>
            <div class="issue-date">
                إصدار: {{ card.created_at|date:"Y-m-d" }}
            </div>
        </div>
    </div>
    
    <div class="print-btn-container text-center">
        <button onclick="window.print()" class="btn btn-primary btn-lg rounded-pill shadow px-4 mb-2">
            <i class="bi bi-printer me-2"></i> طباعة البطاقة
        </button>
        <br>
        <button onclick="window.close()" class="btn btn-outline-secondary rounded-pill shadow px-4">
            <i class="bi bi-x-circle me-2"></i> إغلاق
        </button>
    </div>

    <script>
        // Generate Barcode
        JsBarcode("#barcode", "{{ card.code }}", {
            format: "CODE128",
            lineColor: "#000",
            width: 2,
            height: 40,
            displayValue: false,
            background: "transparent"
        });
        
        // الاختياري: الطباعة التلقائية عند فتح الصفحة
        // window.onload = function() { window.print(); }
    </script>
</body>
</html>
